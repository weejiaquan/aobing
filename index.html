<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AOBA">
  <meta property="og:title" content="AOBA">
  <meta property="og:description" content="Click.">
  <meta property="og:image" content="assets/aoba-idle.webp">
  <title>AOBA</title>
  <link rel="preload" href="assets/aoba-active.webp" as="image">
  <style>
    /* --- Reset & Base --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background-color: #1a1a2e;
      background-image: url('assets/bg.png');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    /* --- Intro Curtain --- */
    #curtain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* --- Intro Text --- */
    #intro-text {
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 900;
      color: #2b4c8c;
      letter-spacing: 0.15em;
      text-shadow: 0 2px 10px rgba(43, 76, 140, 0.3);
      user-select: none;
    }

    #intro-hint {
      font-size: 1.1rem;
      color: rgba(43, 76, 140, 0.5);
      user-select: none;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* --- Character --- */
    #character {
      position: relative;
      z-index: 10;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }

    #character img {
      height: 90vh;
      width: auto;
      pointer-events: none;
    }

    #character:hover {
      filter: brightness(1.05);
      transition: filter 0.2s ease;
    }

    /* --- Particle Container --- */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    /* --- Click Counter --- */
    #click-counter {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 1.2rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.6);
      z-index: 50;
      user-select: none;
      pointer-events: none;
    }

    /* --- Volume Control --- */
    #volume-control {
      position: fixed;
      bottom: 16px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 6px 12px;
      z-index: 50;
      user-select: none;
      transition: background 0.2s ease;
    }

    #volume-control:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    #mute-btn {
      font-size: 1.5rem;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    #volume-slider {
      width: 0;
      opacity: 0;
      transition: width 0.3s ease, opacity 0.3s ease;
      accent-color: #4dabf7;
      cursor: pointer;
    }

    #volume-control:hover #volume-slider {
      width: 80px;
      opacity: 1;
    }

    /* --- Disclaimer --- */
    #disclaimer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
      padding: 4px 16px;
      z-index: 50;
      user-select: none;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      font-weight: 900;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- Intro Elements -->
  <div id="curtain">
    <div id="intro-hint">Click to begin</div>
  </div>

  <!-- Character (clickable) -->
  <div id="character">
    <img id="aoba-img" src="assets/aoba-idle.webp" alt="Aoba">
  </div>

  <!-- Floating text particles container -->
  <div id="particles"></div>

  <!-- Click counter -->
  <div id="click-counter">0</div>

  <!-- Sound -->
  <audio id="aoba-sound" src="assets/aobing.mp3" preload="auto"></audio>

  <!-- BGM -->
  <audio id="bgm" src="assets/bgm.mp3" preload="auto" loop></audio>

  <!-- Volume Control -->
  <div id="volume-control">
    <button id="mute-btn">🔊</button>
    <input type="range" id="volume-slider" min="0" max="100" value="10">
  </div>

  <!-- Disclaimer -->
  <div id="disclaimer">Aobing.it is not affiliated with Nexon, Nexon Games or Yostar. All game artwork, information and assets used in this database are the property and copyright of the respective authors.</div>

  <!-- anime.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@4/dist/bundles/anime.umd.min.js"></script>

  <script>
    const { animate, createTimeline } = anime;

    // --- Intro Animation (~2s) ---
    function playIntro() {
      const tl = createTimeline({
        defaults: { ease: 'outExpo' },
        onComplete: () => {
          document.getElementById('curtain')?.remove();
        }
      });

      // T=300ms: Curtain (with text inside) slides up
      tl.add('#curtain', {
        translateY: '-100%',
        duration: 1200,
        ease: 'inOutQuad',
      }, 300);
    }

    // Run intro on curtain click + start BGM
    const bgm = document.getElementById('bgm');
    const muteBtn = document.getElementById('mute-btn');
    const volumeSlider = document.getElementById('volume-slider');
    bgm.volume = 0.1;
    let bgmPlaying = false;
    let lastVolume = 0.1;

    document.getElementById('curtain').addEventListener('click', () => {
      playIntro();
      bgm.play().then(() => {
        bgmPlaying = true;
        muteBtn.textContent = '🔊';
      }).catch(() => {});
    }, { once: true });

    // Mute/unmute toggle
    muteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (bgm.volume > 0) {
        lastVolume = bgm.volume;
        bgm.volume = 0;
        volumeSlider.value = 0;
        muteBtn.textContent = '🔇';
      } else {
        bgm.volume = lastVolume;
        volumeSlider.value = lastVolume * 100;
        muteBtn.textContent = '🔊';
        if (!bgmPlaying) {
          bgm.play();
          bgmPlaying = true;
        }
      }
    });

    // Volume slider
    volumeSlider.addEventListener('input', (e) => {
      e.stopPropagation();
      const vol = e.target.value / 100;
      bgm.volume = vol;
      if (vol === 0) {
        muteBtn.textContent = '🔇';
      } else {
        muteBtn.textContent = '🔊';
        lastVolume = vol;
        if (!bgmPlaying) {
          bgm.play();
          bgmPlaying = true;
        }
      }
    });

    // --- Text Particles (Cookie Clicker style) ---
    const PARTICLE_TEXTS = ['うぇ', '💢', '😭', 'うぇぇ', '😤', '😢', '💢💢', 'うぇっ', '😡', '😿'];
    const PARTICLE_COLORS = ['#ff6b6b', '#ffa94d', '#69db7c', '#4dabf7', '#da77f2', '#ffd43b', '#ff8787'];

    function spawnParticles() {
      const container = document.getElementById('particles');
      const count = 5 + Math.floor(Math.random() * 4); // 5-8 particles per click

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = PARTICLE_TEXTS[Math.floor(Math.random() * PARTICLE_TEXTS.length)];

        // Random styling
        const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
        const fontSize = 28 + Math.floor(Math.random() * 20); // 28-48px
        const startX = 10 + Math.random() * 80; // 10-90% from left

        particle.style.cssText = `
          left: ${startX}%;
          bottom: -40px;
          color: ${color};
          font-size: ${fontSize}px;
        `;

        container.appendChild(particle);

        // Animate upward with drift and fade
        const drift = -30 + Math.random() * 60; // -30 to +30px horizontal drift
        const duration = 1500 + Math.random() * 1000; // 1.5-2.5s
        const delay = Math.random() * 300; // 0-300ms stagger

        animate(particle, {
          translateY: [0, -(window.innerHeight + 100)],
          translateX: [0, drift],
          opacity: [1, 0],
          duration: duration,
          delay: delay,
          ease: 'outQuad',
          onComplete: () => {
            particle.remove();
          },
        });
      }
    }

    // --- Click Interaction ---
    const character = document.getElementById('character');
    const aobaImg = document.getElementById('aoba-img');
    const aobaSound = document.getElementById('aoba-sound');

    let bounceAnimation = null;
    let clickCount = 0;
    const clickCounter = document.getElementById('click-counter');

    character.addEventListener('click', () => {
      clickCount++;
      clickCounter.textContent = clickCount;
      // 1. Restart sound (allows spam clicking)
      aobaSound.currentTime = 0;
      aobaSound.play();

      // 2. Swap to active image
      aobaImg.src = 'assets/aoba-active.webp';

      // 3. Damped bounce animation
      // Cancel any existing bounce
      if (bounceAnimation) {
        bounceAnimation.pause();
      }

      // Reset position before new bounce
      character.style.transform = '';

      bounceAnimation = animate(character, {
        translateY: [
          { to: '-80px', duration: 300, ease: 'outQuad' },
          { to: '0px', duration: 400, ease: 'outBounce' },
        ],
      });

      // 4. Spawn text particles
      spawnParticles();
    });

    // Swap back to idle and stop bounce when sound ends
    aobaSound.addEventListener('ended', () => {
      aobaImg.src = 'assets/aoba-idle.webp';
      if (bounceAnimation) {
        bounceAnimation.pause();
        character.style.transform = '';
      }
    });
  </script>
</body>
</html>
