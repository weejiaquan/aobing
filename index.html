<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AOBA</title>
  <style>
    /* --- Reset & Base --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background-color: #1a1a2e;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    /* --- Intro Curtain --- */
    #curtain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 100;
    }

    /* --- Intro Text --- */
    #intro-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 900;
      color: #2b4c8c;
      letter-spacing: 0.15em;
      text-shadow: 0 2px 10px rgba(43, 76, 140, 0.3);
      z-index: 101;
      opacity: 0;
      user-select: none;
    }

    /* --- Character --- */
    #character {
      position: relative;
      z-index: 10;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }

    #character img {
      height: clamp(300px, 55vh, 600px);
      width: auto;
      pointer-events: none;
    }

    /* --- Particle Container --- */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      font-weight: 900;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- Intro Elements -->
  <div id="curtain"></div>
  <div id="intro-text">AOBA</div>

  <!-- Character (clickable) -->
  <div id="character">
    <img id="aoba-img" src="assets/aoba-idle.webp" alt="Aoba">
  </div>

  <!-- Floating text particles container -->
  <div id="particles"></div>

  <!-- Sound -->
  <audio id="aoba-sound" src="assets/aobing.mp3" preload="auto"></audio>

  <!-- anime.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>

  <script>
    const { animate, createTimeline } = anime;

    // --- Intro Animation (~2s) ---
    function playIntro() {
      const tl = createTimeline({
        defaults: { ease: 'outExpo' },
        onComplete: () => {
          document.getElementById('curtain')?.remove();
          document.getElementById('intro-text')?.remove();
        }
      });

      // T=300ms: Curtain slides up
      tl.add('#curtain', {
        translateY: '-100%',
        duration: 800,
        ease: 'inOutQuad',
      }, 300);

      // T=800ms: "AOBA" text fades in and tweens up to center
      tl.add('#intro-text', {
        opacity: [0, 1],
        translateY: ['2rem', '0'],
        duration: 600,
        ease: 'outExpo',
      }, 800);

      // T=1800ms: Text tweens upward off-screen
      tl.add('#intro-text', {
        translateY: [0, '-100vh'],
        opacity: [1, 0],
        duration: 500,
        ease: 'inQuad',
      }, 1800);
    }

    // Run intro on page load
    document.addEventListener('DOMContentLoaded', playIntro);
  </script>
</body>
</html>
