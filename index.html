<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AOBA</title>
  <style>
    /* --- Reset & Base --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background-color: #1a1a2e;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    /* --- Intro Curtain --- */
    #curtain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 100;
    }

    /* --- Intro Text --- */
    #intro-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 900;
      color: #2b4c8c;
      letter-spacing: 0.15em;
      text-shadow: 0 2px 10px rgba(43, 76, 140, 0.3);
      z-index: 101;
      opacity: 0;
      user-select: none;
    }

    /* --- Character --- */
    #character {
      position: relative;
      z-index: 10;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }

    #character img {
      height: clamp(300px, 55vh, 600px);
      width: auto;
      pointer-events: none;
    }

    /* --- Particle Container --- */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      font-weight: 900;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- Intro Elements -->
  <div id="curtain"></div>
  <div id="intro-text">AOBA</div>

  <!-- Character (clickable) -->
  <div id="character">
    <img id="aoba-img" src="assets/aoba-idle.webp" alt="Aoba">
  </div>

  <!-- Floating text particles container -->
  <div id="particles"></div>

  <!-- Sound -->
  <audio id="aoba-sound" src="assets/aobing.mp3" preload="auto"></audio>

  <!-- anime.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@4/dist/bundles/anime.umd.min.js"></script>

  <script>
    const { animate, createTimeline } = anime;

    // --- Intro Animation (~2s) ---
    function playIntro() {
      const tl = createTimeline({
        defaults: { ease: 'outExpo' },
        onComplete: () => {
          document.getElementById('curtain')?.remove();
          document.getElementById('intro-text')?.remove();
        }
      });

      // T=300ms: Curtain slides up
      tl.add('#curtain', {
        translateY: '-100%',
        duration: 800,
        ease: 'inOutQuad',
      }, 300);

      // T=800ms: "AOBA" text fades in and tweens up to center
      tl.add('#intro-text', {
        opacity: [0, 1],
        translateY: ['2rem', '0'],
        duration: 600,
        ease: 'outExpo',
      }, 800);

      // T=1800ms: Text tweens upward off-screen
      tl.add('#intro-text', {
        translateY: [0, '-100vh'],
        opacity: [1, 0],
        duration: 500,
        ease: 'inQuad',
      }, 1800);
    }

    // Run intro on page load
    document.addEventListener('DOMContentLoaded', playIntro);

    // --- Text Particles (Cookie Clicker style) ---
    const PARTICLE_TEXTS = ['AOBA!', 'AAAA!', 'sensei!', 'KYAAA!', 'あおば!', 'AOBA!!', 'きゃー!'];
    const PARTICLE_COLORS = ['#ff6b6b', '#ffa94d', '#69db7c', '#4dabf7', '#da77f2', '#ffd43b', '#ff8787'];

    function spawnParticles() {
      const container = document.getElementById('particles');
      const count = 5 + Math.floor(Math.random() * 4); // 5-8 particles per click

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = PARTICLE_TEXTS[Math.floor(Math.random() * PARTICLE_TEXTS.length)];

        // Random styling
        const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
        const fontSize = 14 + Math.floor(Math.random() * 11); // 14-24px
        const startX = 10 + Math.random() * 80; // 10-90% from left

        particle.style.cssText = `
          left: ${startX}%;
          bottom: -40px;
          color: ${color};
          font-size: ${fontSize}px;
        `;

        container.appendChild(particle);

        // Animate upward with drift and fade
        const drift = -30 + Math.random() * 60; // -30 to +30px horizontal drift
        const duration = 1500 + Math.random() * 1000; // 1.5-2.5s
        const delay = Math.random() * 300; // 0-300ms stagger

        animate(particle, {
          translateY: [0, -(window.innerHeight + 100)],
          translateX: [0, drift],
          opacity: [1, 0],
          duration: duration,
          delay: delay,
          ease: 'outQuad',
          onComplete: () => {
            particle.remove();
          },
        });
      }
    }

    // --- Click Interaction ---
    const character = document.getElementById('character');
    const aobaImg = document.getElementById('aoba-img');
    const aobaSound = document.getElementById('aoba-sound');

    let bounceAnimation = null;

    character.addEventListener('click', () => {
      // 1. Restart sound (allows spam clicking)
      aobaSound.currentTime = 0;
      aobaSound.play();

      // 2. Swap to active image
      aobaImg.src = 'assets/aoba-active.webp';

      // 3. Damped bounce animation
      // Cancel any existing bounce
      if (bounceAnimation) {
        bounceAnimation.pause();
      }

      // Reset position before new bounce
      character.style.transform = '';

      bounceAnimation = animate(character, {
        translateY: [
          { to: '-80px', duration: 300, ease: 'outQuad' },
          { to: '0px', duration: 400, ease: 'outBounce' },
        ],
      });

      // 4. Spawn text particles
      spawnParticles();
    });

    // Swap back to idle and stop bounce when sound ends
    aobaSound.addEventListener('ended', () => {
      aobaImg.src = 'assets/aoba-idle.webp';
      if (bounceAnimation) {
        bounceAnimation.pause();
        character.style.transform = '';
      }
    });
  </script>
</body>
</html>
